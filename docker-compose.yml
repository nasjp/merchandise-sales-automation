name: merchandise-sales-automation-local

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: msa-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-55444}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - msa-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: msa-minio
    ports:
      - "${MINIO_API_HOST_PORT:-59100}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-59101}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - msa-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    container_name: msa-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/tsunagaru-uploads || true;
      /usr/bin/mc policy set public myminio/tsunagaru-uploads;
      exit 0;
      "

volumes:
  msa-postgres-data:
  msa-minio-data:
